services:
  modmail:
    build:
      context: .
    image: ghcr.io/mayvqt/modmail:latest
    container_name: modmail
    restart: unless-stopped
    init: true
    environment:
      DB_PATH: /data/modmail.sqlite
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${MODMAIL_DATA_DIR:-./data}:/data
    stop_grace_period: 20s
