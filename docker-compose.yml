services:
  modmail:
    build:
      context: .
    image: ${IMAGE_REPOSITORY:-modmail}:${IMAGE_TAG:-local}
    container_name: modmail
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      DB_PATH: /data/modmail.sqlite
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${MODMAIL_DATA_DIR:-./data}:/data
    stop_grace_period: 20s
